[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --no-header -p no:warnings
markers =
    superadmin: Superadmin auth and shop management
    shop_login: Shop admin login flows
    customer: Customer registration and login
    booking: Booking flow (hold/pay/confirm)
    wallet: Wallet top-up and balance
    feature_flags: Feature flag management
    dashboard: Admin dashboard endpoints
